workflows:
  android-release:
    name: Android Release

    max_build_duration: 60

    environment:
      node: 22.17.1
      java: 21

      android_signing:
        - lusture_anish

    cache:
      cache_paths:
        - ~/.bun
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"

      - name: Install dependencies
        script: |
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"
          bun install --frozen-lockfile

      - name: Verify Capacitor
        script: |
          chmod +x ./node_modules/.bin/cap
          ./node_modules/.bin/cap --version

      - name: Sync Android
        script: |
          chmod +x ./node_modules/.bin/cap
          ./node_modules/.bin/cap sync android

      - name: Build Signed Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=lustre \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

      - name: Build Signed Release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=lustre \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab