<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Lustre</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0F172A;
        color: #E2E8F0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .box { padding: 24px; }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #fff;
        border-radius: 50%;
        margin: 0 auto 16px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spinner"></div>
      <div>Loading Lustre…</div>
    </div>
    <script>
      // Fallback: if the remote server.url from capacitor.config.ts is not
      // reachable, redirect to the hosted app so the user always lands there.
      setTimeout(function () {
        if (document.readyState !== "complete") return;
        try { window.location.replace("https://lustre-saloon.vercel.app"); } catch (e) {}
      }, 8000);
    </script>
  </body>
</html>
